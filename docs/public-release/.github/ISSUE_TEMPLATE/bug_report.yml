name: Bug report
description: Report something that did not work as expected.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Planban. Please avoid sharing private board data, repo paths, logs, screenshots, or project details unless you are comfortable making them public.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Tell us what went wrong and what you were trying to do.
      placeholder: I asked Codex to open my Planban board, but...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the shortest set of steps that trigger the problem.
      placeholder: |
        1. Install Planban from...
        2. Ask Codex to...
        3. See...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: I expected Planban to...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Codex app/CLI context, install method, and Planban version if known.
      placeholder: macOS, Codex desktop, installed from piercekearns/planban
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I have removed private repo paths, board contents, credentials, logs, screenshots, and project details that should not be public.
          required: true
