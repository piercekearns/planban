name: Product feedback
description: Share a reaction, rough edge, question, or experience report.
title: "[Feedback]: "
labels: ["feedback", "needs-triage"]
body:
  - type: textarea
    id: feedback
    attributes:
      label: Feedback
      description: What did you notice while trying Planban?
      placeholder: I tried Planban and...
    validations:
      required: true
  - type: dropdown
    id: stage
    attributes:
      label: Where did this come up?
      options:
        - Installing Planban
        - First-run demo board
        - Setting up a real project
        - Using Codex with Planban
        - Moving or editing cards
        - Reading docs
        - Other
  - type: input
    id: contact
    attributes:
      label: Contact
      description: Optional. Add your GitHub handle or preferred contact if you are open to follow-up.
      placeholder: "@username"
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I have removed private details that should not be public.
          required: true
