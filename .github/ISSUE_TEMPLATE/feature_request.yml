name: Feature request
description: Suggest a new capability or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the job you want Planban to make easier. Concrete examples are helpful, but please avoid sharing private project details.
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      placeholder: I want to use Planban to...
    validations:
      required: true
  - type: textarea
    id: ideal-outcome
    attributes:
      label: What would the ideal outcome look like?
      placeholder: It would be useful if Planban...
    validations:
      required: true
  - type: textarea
    id: current-workaround
    attributes:
      label: Current workaround
      description: Optional. Tell us how you handle this today.
  - type: dropdown
    id: area
    attributes:
      label: Product area
      options:
        - Codex plugin
        - MCP tools
        - Kanban board UI
        - Roadmap/card workflow
        - Installation/onboarding
        - Documentation
        - Other
